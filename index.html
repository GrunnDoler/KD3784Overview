const tbody = document.getElementById("tableBody");

function createProgress(percent){

if(percent==="") return `<div class="progress-container"><div class="progress-bar gray" style="width:0%"></div></div>`;

let p = parseFloat(percent.replace(",","."));

let color="red";

if(p>=100) color="green";
else if(p>=70) color="yellow";

let width=Math.min(p,100);

return `
<div class="progress-container">
<div class="progress-bar ${color}" style="width:${width}%"></div>
</div>
`;

}

/* BUILD TABLE */

data.trim().split("\n").forEach(row=>{

let cols=row.split("|");

let tr=document.createElement("tr");

cols.forEach((cell,i)=>{

let td=document.createElement("td");

td.textContent=cell;

if(i>=3 && i<=6) td.className="num";

if(i===7) td.className="remark";

tr.appendChild(td);

});

let percent=cols[6] || "";

let bar=document.createElement("td");

bar.innerHTML=createProgress(percent);

tr.appendChild(bar);

tbody.appendChild(tr);

});


/* SEARCH */

document.getElementById("search").addEventListener("keyup",function(){

let filter=this.value.toLowerCase();

let rows=document.querySelectorAll("#govTable tbody tr");

rows.forEach(r=>{

let name=r.cells[1].textContent.toLowerCase();

r.style.display=name.includes(filter)?"":"none";

});

});


/* SORTING */

let sortDirection=true;

function sortTable(col){

const table=document.getElementById("govTable");

const tbody=table.tBodies[0];

const rows=[...tbody.rows];

rows.sort((a,b)=>{

let A=a.cells[col].textContent.replace(/[.,]/g,"");

let B=b.cells[col].textContent.replace(/[.,]/g,"");

return sortDirection ? A.localeCompare(B,undefined,{numeric:true})
                     : B.localeCompare(A,undefined,{numeric:true});

});

sortDirection=!sortDirection;

rows.forEach(r=>tbody.appendChild(r));

}

</script>
